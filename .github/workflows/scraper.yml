name: Fusion Scraper

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: threads/
          key: scraper-state-${{ github.run_id }}
          restore-keys: |
            scraper-state-

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
          REPLY_TEXT: "Hallo! Wir haben Interesse: G7Q7P, 9EHZX. Danke für dein Angebot!"
          KEYWORDS: "biete,verkaufe,abzugeben,tausche,gebe,gebe ab"
          IGNORE_KEYWORDS: "at.tension,suche"
          MAX_PAGES: "3"
        run: python src/scraper.py

      - name: Commit and push state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threads/ logs/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update scraper state [skip ci]"
          git push
