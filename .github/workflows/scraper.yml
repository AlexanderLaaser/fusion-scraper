name: Fusion Scraper

on:
  # Scheduled runs moved to a crontab on the Azure VM — keep this disabled
  # to avoid two schedulers racing on divergent threads/ state.
  workflow_dispatch:

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: threads/
          key: scraper-state-${{ github.run_id }}
          restore-keys: |
            scraper-state-

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORUM_USERNAME_1: ${{ secrets.FORUM_USERNAME_1 }}
          FORUM_PASSWORD_1: ${{ secrets.FORUM_PASSWORD_1 }}
          FORUM_USERNAME_2: ${{ secrets.FORUM_USERNAME_2 }}
          FORUM_PASSWORD_2: ${{ secrets.FORUM_PASSWORD_2 }}
          FORUM_USERNAME_3: ${{ secrets.FORUM_USERNAME_3 }}
          FORUM_PASSWORD_3: ${{ secrets.FORUM_PASSWORD_3 }}
          FORUM_USERNAME_4: ${{ secrets.FORUM_USERNAME_4 }}
          FORUM_PASSWORD_4: ${{ secrets.FORUM_PASSWORD_4 }}
          FORUM_USERNAME_5: ${{ secrets.FORUM_USERNAME_5 }}
          FORUM_PASSWORD_5: ${{ secrets.FORUM_PASSWORD_5 }}
          KEYWORDS: "biete,verkaufe,abzugeben,tausche,gebe,gebe ab"
          IGNORE_KEYWORDS: "at.tension,suche"
          MAX_PAGES: "3"
        run: python src/scraper.py

      - name: Commit and push state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threads/ logs/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update scraper state [skip ci]"
          git pull --rebase && git push
